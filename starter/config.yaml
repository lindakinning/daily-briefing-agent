roles:
  - Work
  - Personal

google:
  credentials_path: credentials/google_credentials.json
  token_path: credentials/google_token.json
  gmail_query: "newer_than:1d (is:unread OR is:starred)"
  calendar_hours_ahead: 36

anthropic:
  model: "claude-sonnet-4-6"
  max_tokens: 4096

outputs:
  brief_dir: output
  brief_prefix: "Daily Brief"

prompt_rules:
  - "Keep the brief SHORT — synthesize, don't enumerate every email."
  - "focus_today: max 3 biggest items only."
  - "work_plan: one paragraph with time blocks and effort estimate."
  - "Only create tasks that are explicit or strongly implied action items."
  - "NEVER duplicate a task listed in existing_reminders."
  - "Most task urgency should be this_week or whenever — max 2 today."
  - "Include time_estimate on every task."
  - "wellness: 2-3 practical nudges."
  - "movement_challenge: 3-5 micro-movements (30 min or less)."

# Customize these for your life:
# prompt_rules:
#   - "I don't work weekends — personal brief only Sat/Sun."
#   - "Tag everything Work or Personal."
#   - "Always include a movement challenge."
